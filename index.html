<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Slide Peraga Wisuda Tajwid 2026 (Hybrid Mode)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0d231d; color: #f4ebd0; overflow: hidden; height: 100vh; }

        /* SISTEM SLIDE PPT */
        .slide {
            display: none;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            padding: 40px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #113329 0%, #081713 100%);
            transition: all 0.5s ease-in-out;
        }
        .slide.active { display: flex; }

        /* NAVIGASI BACK UNTUK OPERATOR */
        .btn-back-slide {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: #d4af37;
            border: 1px solid #d4af37;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            z-index: 10;
        }
        .btn-back-slide:hover { background: #d4af37; color: #0d231d; }

        /* SLIDE 1: JUDUL UTAMA (COVER) */
        .cover-title { font-size: 48px; color: #d4af37; text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .cover-subtitle { font-size: 24px; color: #ffffff; text-align: center; margin-bottom: 40px; font-style: italic; opacity: 0.9; }
        .btn-start { background: linear-gradient(135deg, #d4af37, #aa820a); color: #0d231d; border: none; padding: 15px 40px; font-size: 18px; font-weight: bold; border-radius: 30px; cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: transform 0.2s; }
        .btn-start:hover { transform: scale(1.05); }

        /* SLIDE 2: DATA SISWA */
        .section-title { font-size: 32px; color: #d4af37; text-transform: uppercase; margin-bottom: 30px; text-align: center; border-bottom: 2px solid #d4af37; padding-bottom: 10px; width: 80%; }
        .grid-siswa { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; width: 85%; max-height: 70vh; overflow-y: auto; padding-right: 10px; }
        .card-siswa { background: #163d33; border: 1px solid rgba(212, 175, 55, 0.4); padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .card-siswa:hover { background: #d4af37; transform: translateY(-5px); }
        .card-siswa:hover h3 { color: #0d231d; }
        .card-siswa:hover p { color: #222; }
        .card-siswa h3 { font-size: 18px; color: #ffffff; margin-bottom: 5px; }
        .card-siswa p { font-size: 13px; color: #a3b8b0; }

        /* SLIDE 3: INTERFACE UJIAN & DISPLAY AYAT */
        .panel-control-top { display: flex; gap: 15px; width: 90%; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; border: 1px solid rgba(212,175,55,0.2); margin-bottom: 20px; align-items: flex-end; }
        .control-group { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .control-group label { font-size: 12px; color: #d4af37; font-weight: bold; text-transform: uppercase; }
        select, input { background-color: #163d33; color: #ffffff; border: 1px solid #d4af37; padding: 10px; border-radius: 5px; font-size: 14px; outline: none; }
        .btn-tampil { background: #d4af37; color: #0d231d; border: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; cursor: pointer; height: 41px; }

        /* DISPLAY UTAMA AYAT */
        .display-container { flex: 1; width: 90%; background: rgba(255,255,255,0.02); border-radius: 15px; border: 1px dashed rgba(212,175,55,0.3); display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; padding: 20px; }
        .meta-info { font-size: 22px; color: #d4af37; font-weight: 600; margin-bottom: 15px; text-align: center; }
        .arabic-text { font-family: 'Traditional Arabic', Georgia, serif; font-size: 52px; text-align: center; direction: rtl; line-height: 2.2; color: #ffffff; width: 100%; max-height: 60vh; overflow-y: auto; padding: 10px; word-wrap: break-word; }

        /* NAVIGASI TOMBOL SLIDE BAWAH */
        .nav-ayat-buttons { display: flex; gap: 20px; margin-top: 15px; width: 30%; }
        .btn-nav-ayat { flex: 1; background: #163d33; color: #d4af37; border: 1px solid #d4af37; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-nav-ayat:hover { background: #d4af37; color: #0d231d; }

        /* BADGE STATUS */
        .active-student-badge { position: absolute; top: 15px; right: 20px; background: #aa820a; color: #ffffff; padding: 5px 15px; border-radius: 20px; font-size: 13px; font-weight: bold; }
        .status-badge { position: absolute; bottom: 20px; right: 20px; padding: 5px 15px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .status-online { background-color: #2e7d32; color: white; }
        .status-offline { background-color: #c62828; color: white; }
        
        .loading-text { color: #ffffff; font-style: italic; font-size: 16px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="slide1" class="slide active">
        <h1 class="cover-title">WISUDA TAJWID MD-TK 2026</h1>
        <p class="cover-subtitle">Haflatul Imtihan Wal Ikhtihar 4</p>
        <button class="btn-start" onclick="pindahSlide(2)">Mulai &rarr;</button>
        <div id="loadingStatus" class="loading-text">Menghubungkan ke database hybrid...</div>
    </div>

    <div id="slide2" class="slide">
        <button class="btn-back-slide" onclick="pindahSlide(1)">&larr; Kembali ke Judul</button>
        <h2 class="section-title">Daftar Peserta Ujian Tajwid</h2>
        <div class="grid-siswa" id="gridSiswaKontainer"></div>
    </div>

    <div id="slide3" class="slide">
        <button class="btn-back-slide" onclick="pindahSlide(2)">&larr; Kembali ke Data Siswa</button>
        <div class="active-student-badge" id="siswaAktifBadge">Peserta: Umum</div>

        <div class="panel-control-top">
            <div class="control-group">
                <label>Lompat Awal Juz</label>
                <select id="juzShortcutSelect" onchange="lompatKeAwalJuz()">
                    <option value="">-- Pilih Juz 1 - 30 --</option>
                    <option value="1,1">Juz 1 (Al-Fatihah Ayat 1)</option>
                    <option value="2,142">Juz 2 (Al-Baqarah Ayat 142)</option>
                    <option value="3,253">Juz 3 (Al-Baqarah Ayat 253)</option>
                    <option value="30,1">Juz 30 (An-Naba' Ayat 1)</option>
                </select>
            </div>
            <div class="control-group">
                <label>Pilih Surah</label>
                <select id="surahSelect"></select>
            </div>
            <div class="control-group" style="flex: 0.4;">
                <label>Ayat</label>
                <input type="number" id="ayatInput" min="1" value="1">
            </div>
            <button class="btn-tampil" onclick="renderAyatLayar()">PROYEKSIKAN</button>
        </div>

        <div class="display-container">
            <div class="meta-info" id="metaInfoDisplay">Silakan Pilih Ayat Terlebih Dahulu</div>
            <div class="arabic-text" id="arabicTextDisplay">---</div>
            <div id="modeBadge" class="status-badge status-offline">Mengecek Jaringan...</div>
        </div>

        <div class="nav-ayat-buttons">
            <button class="btn-nav-ayat" onclick="navigasiAyat(-1)">&larr; Ayat Sebelumnya</button>
            <button class="btn-nav-ayat" onclick="navigasiAyat(1)">Ayat Berikutnya &rarr;</button>
        </div>
    </div>

    <script>
        const SPREADSHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQSLdOv1AZmSd-BMDOTA6B1V8UXHtXcJ5FfqjPHTUWRkJ5bJxeTgQZAsBa9SLzGUI5gUog-VgfhB5g/pub?gid=0&single=true&output=csv";
        
        let isOnlineMode = false;

        // 1. DATABASE OFFLINE (Backup internal jika internet mati total)
        const BACKUP_SISWA_OFFLINE = [
            { nama: "Ahmad Fauzan (Offline)", reg: "001/WT/2026" },
            { nama: "Siti Aminah (Offline)", reg: "002/WT/2026" },
            { nama: "Muhammad Rizky (Offline)", reg: "003/WT/2026" }
        ];

        const BACKUP_QURAN_OFFLINE = {
            "1_1": "بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ",
            "1_2": "الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ",
            "1_3": "الرَّحْمَٰنِ الرَّحِيمِ",
            "78_1": "عَمَّ يَتَسَاءَلُونَ"
        };

        // Kontainer Utama Aplikasi (Berubah dinamis saat online)
        let databaseSiswaAktif = [...BACKUP_SISWA_OFFLINE];
        let databaseQuranAktif = {...BACKUP_QURAN_OFFLINE};

        const daftarNamaSurah = ["Al-Fatihah","Al-Baqarah","Ali 'Imran","An-Nisa'","Al-Ma'idah","Al-An'am","Al-A'raf","Al-Anfal","At-Taubah","Yunus","Hud","Yusuf","Ar-Ra'd","Ibrahim","Al-Hijr","An-Nahl","Al-Isra'","Al-Kahf","Maryam","Taha","Al-Anbiya'","Al-Hajj","Al-Mu'minun","An-Nur","Al-Furqan","Asy-Syu'ara'","An-Naml","Al-Qasas","Al-'Ankabut","Ar-Rum","Luqman","As-Sajdah","Al-Ahzab","Saba'","Fatir","Yasin","As-Saffat","Sad","Az-Zumar","Ghafir","Fussilat","Asy-Syura","Az-Zukhruf","Ad-Dukhan","Al-Jasiyah","Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf","Az-Zariyat","At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid","Al-Mujadilah","Al-Hasyr","Al-Mumtahanah","As-Saff","Al-Jumu'ah","Al-Munafiqun","At-Taghabun","At-Talaq","At-Tahrim","Al-Mulk","Al-Qalam","Al-Haqqah","Al-Ma'arij","Nuh","Al-Jinn","Al-Muzzammil","Al-Muddassir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba'","An-Nazi'at","'Abasa","At-Takwir","Al-Infitar","Al-Mutaffifin","Al-Insiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghasyiyah","Al-Fajr","Al-Balad","Asy-Syams","Al-Lail","Ad-Duha","Asy-Syarh","At-Tin","Al-'Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-'Adiyat","Al-Qari'ah","At-Takasur","Al-'Asr","Al-Humazah","Al-Fil","Quraisy","Al-Ma'un","Al-Kausar","Al-Kafirun","An-Nasr","Al-Lahab","Al-Ikhlas","Al-Falaq","An-Nas"];
        const daftarBatasJuz = [{ juz: 1, s: 1, a: 1 }, { juz: 2, s: 2, a: 142 }, { juz: 3, s: 2, a: 253 }, { juz: 30, s: 78, a: 1 }];
        const petaNomorSurahPintasan = { 1: 1, 2: 2, 3: 2, 4: 78 };

        // 2. FUNGSI UTAMA HYBRID: Coba Online, Jika Gagal Pakai Offline
        async function sinkronisasiDatabaseHybrid() {
            try {
                // Beri timeout 4 detik, jika internet terlalu lelet langsung bypass ke offline
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 4000);

                const response = await fetch(SPREADSHEET_URL, { signal: controller.signal });
                const csvText = await response.text();
                clearTimeout(timeoutId);

                const baris = csvText.split(/\r?\n/);
                let tempSiswa = [];
                let tempQuran = {};

                for (let i = 1; i < baris.length; i++) {
                    if (!baris[i]) continue;
                    const kolom = baris[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const tipeData = kolom[0] ? kolom[0].replace(/"/g, '').trim().toLowerCase() : "";

                    if (tipeData === "siswa") {
                        tempSiswa.push({
                            nama: kolom[1].replace(/"/g, '').trim(),
                            reg: kolom[2].replace(/"/g, '').trim()
                        });
                    } else if (tipeData === "quran" || tipeData === "") {
                        const idSurah = kolom[1] ? kolom[1].replace(/"/g, '').trim() : "";
                        const nomorAyat = kolom[2] ? kolom[2].replace(/"/g, '').trim() : "";
                        const teksArab = kolom[3] ? kolom[3].replace(/"/g, '').trim() : "";
                        if(idSurah && nomorAyat) tempQuran[`${idSurah}_${nomorAyat}`] = teksArab;
                    }
                }

                // Jika data hasil download valid, timpa database aktif
                if (tempSiswa.length > 0) databaseSiswaAktif = tempSiswa;
                if (Object.keys(tempQuran).length > 0) databaseQuranAktif = tempQuran;

                isOnlineMode = true;
                updateBadgeStatus("ONLINE (Spreadsheet)", "status-online");
                document.getElementById("loadingStatus").innerText = "Koneksi Cloud Berhasil!";
                
            } catch (error) {
                console.warn("Koneksi gagal atau timeout. Mengaktifkan Mode Offline Cadangan.");
                isOnlineMode = false;
                updateBadgeStatus("OFFLINE (Backup Lokal)", "status-offline");
                document.getElementById("loadingStatus").innerText = "Mode Offline Diaktifkan!";
            }

            renderDaftarSiswa();
            renderAyatLayar();
        }

        function updateBadgeStatus(teks, kelas) {
            const badge = document.getElementById("modeBadge");
            badge.innerText = teks;
            badge.className = `status-badge ${kelas}`;
        }

        function renderDaftarSiswa() {
            let html = "";
            databaseSiswaAktif.forEach(siswa => {
                html += `
                    <div class="card-siswa" onclick="pilihSiswa('${siswa.nama}', '${siswa.reg}')">
                        <h3>${siswa.nama}</h3>
                        <p>No. Reg: ${siswa.reg}</p>
                    </div>`;
            });
            document.getElementById("gridSiswaKontainer").innerHTML = html;
        }

        function renderAyatLayar() {
            const surahId = parseInt(document.getElementById("surahSelect").value);
            const ayatNum = parseInt(document.getElementById("ayatInput").value);
            const key = `${surahId}_${ayatNum}`;
            const namaSurahBersih = daftarNamaSurah[surahId - 1];

            let juzTerdeteksi = 1;
            for (let i = 0; i < daftarBatasJuz.length; i++) {
                let batas = daftarBatasJuz[i];
                if (surahId > batas.s || (surahId === batas.s && ayatNum >= batas.a)) juzTerdeteksi = batas.j;
            }

            document.getElementById("metaInfoDisplay").innerText = `Juz ${juzTerdeteksi} | Surah ${surahId}. ${namaSurahBersih} : Ayat ${ayatNum}`;

            if (databaseQuranAktif[key]) {
                document.getElementById("arabicTextDisplay").innerText = databaseQuranAktif[key];
            } else {
                document.getElementById("arabicTextDisplay").innerText = `(Teks Ayat ${surahId}:${ayatNum} tidak ada di database ${isOnlineMode ? 'Spreadsheet' : 'Lokal'})`;
            }
        }

        function pindahSlide(nomorSlide) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.getElementById(`slide${nomorSlide}`).classList.add('active');
        }

        function pilihSiswa(nama, noReg) {
            document.getElementById("siswaAktifBadge").innerText = `Peserta: ${nama} (${noReg})`;
            pindahSlide(3);
        }

        function lompatKeAwalJuz() {
            let selectJuz = document.getElementById("juzShortcutSelect");
            let shortcutValue = selectJuz.value;
            if (!shortcutValue) return;
            let indeksJuz = selectJuz.selectedIndex; 
            let bagian = shortcutValue.split(",");
            document.getElementById("surahSelect").value = petaNomorSurahPintasan[indeksJuz];
            document.getElementById("ayatInput").value = bagian[1];
            renderAyatLayar();
        }

        function navigasiAyat(arah) {
            let ayatInput = document.getElementById("ayatInput");
            let nilaiBaru = parseInt(ayatInput.value) + arah;
            if (nilaiBaru >= 1) {
                ayatInput.value = nilaiBaru;
                renderAyatLayar();
            }
        }

        window.onload = function() {
            const select = document.getElementById("surahSelect");
            daftarNamaSurah.forEach((nama, indeks) => {
                let opt = document.createElement("option");
                opt.value = indeks + 1;
                opt.innerText = `${indeks + 1}. ${nama}`;
                select.appendChild(opt);
            });
            sinkronisasiDatabaseHybrid();
        };
    </script>
</body>
</html>
