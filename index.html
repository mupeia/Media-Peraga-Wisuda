<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Slide Peraga Wisuda Tajwid 2026</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0d231d; color: #f4ebd0; overflow: hidden; height: 100vh; }

        .slide {
            display: none;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0; left: 0;
            padding: 40px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #113329 0%, #081713 100%);
        }
        .slide.active { display: flex; }

        .btn-back-slide {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.1); color: #d4af37;
            border: 1px solid #d4af37; padding: 8px 15px;
            border-radius: 5px; cursor: pointer; font-weight: bold; z-index: 10;
        }
        .btn-back-slide:hover { background: #d4af37; color: #0d231d; }

        .cover-title { font-size: 48px; color: #d4af37; text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .cover-subtitle { font-size: 24px; color: #ffffff; text-align: center; margin-bottom: 40px; font-style: italic; opacity: 0.9; }
        .btn-start { background: linear-gradient(135deg, #d4af37, #aa820a); color: #0d231d; border: none; padding: 15px 40px; font-size: 18px; font-weight: bold; border-radius: 30px; cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: transform 0.2s; }
        .btn-start:hover { transform: scale(1.05); }

        .section-title { font-size: 32px; color: #d4af37; text-transform: uppercase; margin-bottom: 30px; text-align: center; border-bottom: 2px solid #d4af37; padding-bottom: 10px; width: 80%; }
        .grid-siswa { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; width: 85%; max-height: 70vh; overflow-y: auto; padding-right: 10px; }
        
        .kartu-peserta-baru { background: #163d33; border: 1px solid rgba(212, 175, 55, 0.4); padding: 30px 20px; border-radius: 10px; text-align: center; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .kartu-peserta-baru:hover { background: #d4af37; transform: translateY(-5px); }
        .kartu-peserta-baru:hover h3 { color: #0d231d; }
        .kartu-peserta-baru:hover .nomor-dada-besar { color: #0d231d; }
        .kartu-peserta-baru h3 { font-size: 18px; color: #ffffff; margin-bottom: 12px; font-weight: 600; }
        
        .nomor-dada-besar { font-size: 18px; color: #d4af37; font-weight: bold; letter-spacing: 0.5px; display: block; margin-top: 5px; }

        /* LAYOUT UTK SLIDE 3 */
        .slide3-layout { display: flex; width: 95%; height: 80vh; gap: 30px; margin-top: 30px; }
         
        /* PANEL KIRI: PROFIL HOLDER (FOTO & DETAIL LENGKAP) */
        .profile-hold-panel { flex: 0.8; background: rgba(13, 35, 29, 0.85); border: 2px solid #d4af37; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); }
        .photo-frame { width: 180px; height: 230px; border: 3px solid #d4af37; border-radius: 8px; overflow: hidden; background: #163d33; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        .photo-placeholder { font-size: 60px; color: rgba(214, 175, 55, 0.3); }
        .student-name { font-size: 22px; color: #ffffff; font-weight: bold; text-align: center; margin-bottom: 15px; text-transform: uppercase; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .student-meta { font-size: 13px; color: #e1ede8; text-align: left; line-height: 1.8; width: 100%; padding: 0 10px; }
        .student-meta strong { color: #d4af37; text-transform: uppercase; font-size: 11px; display: block; margin-top: 5px; }

        /* PANEL KANAN: KONTROL DAN PANEL PROYEKSI AYAT */
        .quran-display-panel { flex: 2; display: flex; flex-direction: column; height: 100%; }
        .panel-control-top { display: flex; gap: 15px; width: 100%; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; border: 1px solid rgba(212,175,55,0.2); margin-bottom: 15px; align-items: flex-end; }
        .control-group { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .control-group label { font-size: 12px; color: #d4af37; font-weight: bold; text-transform: uppercase; }
        select, input { background-color: #163d33; color: #ffffff; border: 1px solid #d4af37; padding: 10px; border-radius: 5px; font-size: 14px; outline: none; }
        .btn-tampil { background: #d4af37; color: #0d231d; border: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; cursor: pointer; height: 41px; }

        .display-container { flex: 1; width: 100%; background: rgba(255,255,255,0.02); border-radius: 15px; border: 1px dashed rgba(212,175,55,0.3); display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; padding: 20px; }
        .arabic-text { font-family: 'Traditional Arabic', Georgia, serif; font-size: 52px; text-align: center; direction: rtl; line-height: 2.2; color: #ffffff; width: 100%; max-height: 55vh; overflow-y: auto; padding: 10px; word-wrap: break-word; }

        .nav-ayat-buttons { display: flex; gap: 20px; margin-top: 15px; width: 40%; margin-left: auto; margin-right: auto; }
        .btn-nav-ayat { flex: 1; background: #163d33; color: #d4af37; border: 1px solid #d4af37; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-nav-ayat:hover { background: #d4af37; color: #0d231d; }

        .loading-text { color: #ffffff; font-style: italic; font-size: 16px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="slide1" class="slide active">
        <h1 class="cover-title">WISUDA TAJWID MD 2026</h1>
        <p class="cover-subtitle">Haflatul Imtihan Wal Ikhtihar</p>
        <button class="btn-start" onclick="pindahSlide(2)">Mulai &rarr;</button>
        <div id="loadingStatus" class="loading-text">Sinkronisasi data siswa dari Google Sheets...</div>
    </div>

    <div id="slide2" class="slide">
        <button class="btn-back-slide" onclick="pindahSlide(1)">&larr; Kembali</button>
        <h2 class="section-title">Daftar Peserta Wisuda Tajwid</h2>
        <div class="grid-siswa" id="gridSiswaKontainer">
            <div class="loading-text">Memuat database online peserta wisuda...</div>
        </div>
    </div>

    <div id="slide3" class="slide">
        <button class="btn-back-slide" onclick="pindahSlide(2)">&larr; Data Siswa</button>
         
        <div class="slide3-layout">
            <div class="profile-hold-panel">
                <div class="photo-frame" id="displayFoto">
                    <span class="photo-placeholder">👤</span>
                </div>
                <h2 class="student-name" id="displayNama">NAMA PESERTA</h2>
                <div class="student-meta" id="displayMeta">
                    <strong>Nomor Dada:</strong> -
                    <strong>Tempat Tanggal Lahir:</strong> -
                    <strong>Orangtua:</strong> -
                </div>
            </div>

            <div class="quran-display-panel">
                <div class="panel-control-top">
                    <div class="control-group">
                        <label>Pilih Surah</label>
                        <select id="surahSelect" onchange="renderAyatLayar()"></select>
                    </div>
                    <div class="control-group" style="flex: 0.4;">
                        <label>Ayat</label>
                        <input type="number" id="ayatInput" min="1" value="1" onchange="renderAyatLayar()">
                    </div>
                    <button class="btn-tampil" onclick="renderAyatLayar()">PROYEKSIKAN</button>
                </div>

                <div class="display-container">
                    <div class="arabic-text" id="arabicTextDisplay">---</div>
                </div>

                <div class="nav-ayat-buttons">
                    <button class="btn-nav-ayat" onclick="navigasiAyat(-1)">&larr; Ayat Sebelumnya</button>
                    <button class="btn-nav-ayat" onclick="navigasiAyat(1)">Ayat Berikutnya &rarr;</button>
                </div>
            </div>
        </div>
    </div>

    <script src="quran-data.js"></script>

    <script>
        const URL_DATABASE_SISWA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQSLdOv1AZmSd-BMDOTA6B1V8UXHtXcJ5FfqjPHTUWRkJ5bJxeTgQZAsBa9SLzGUI5gUog-VgfhB5g/pub?gid=1005251124&single=true&output=csv&b=" + new Date().getTime(); 

        const daftarNamaSurah = ["Al-Fatihah","Al-Baqarah","Ali 'Imran","An-Nisa'","Al-Ma'idah","Al-An'am","Al-A'raf","Al-Anfal","At-Taubah","Yunus","Hud","Yusuf","Ar-Ra'd","Ibrahim","Al-Hijr","An-Nahl","Al-Isra'","Al-Kahf","Maryam","Taha","Al-Anbiya'","Al-Hajj","Al-Mu'minun","An-Nur","Al-Furqan","Asy-Syu'ara'","An-Naml","Al-Qasas","Al-'Ankabut","Ar-Rum","Luqman","As-Sajdah","Al-Ahzab","Saba'","Fatir","Yasin","As-Saffat","Sad","Az-Zumar","Ghafir","Fussilat","Asy-Syura","Az-Zukhruf","Ad-Dukhan","Al-Jasiyah","Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf","Az-Zariyat","At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid","Al-Mujadilah","Al-Hasyr","Al-Mumtahanah","As-Saff","Al-Jumu'ah","Al-Munafiqun","At-Taghabun","At-Talaq","At-Tahrim","Al-Mulk","Al-Qalam","Al-Haqqah","Al-Ma'arij","Nuh","Al-Jinn","Al-Muzzammil","Al-Muddassir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba'","An-Nazi'at","'Abasa","At-Takwir","Al-Infitar","Al-Mutaffifin","Al-Insiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghasyiyah","Al-Fajr","Al-Balad","Asy-Syams","Al-Lail","Ad-Duha","Asy-Syarh","At-Tin","Al-'Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-'Adiyat","Al-Qari'ah","At-Takasur","Al-'Asr","Al-Humazah","Al-Fil","Quraisy","Al-Ma'un","Al-Kausar","Al-Kafirun","An-Nasr","Al-Lahab","Al-Ikhlas","Al-Falaq","An-Nas"];

        async function muatDatabaseSiswaOnline() {
            try {
                const response = await fetch(URL_DATABASE_SISWA);
                const csvText = await response.text();
                const baris = csvText.split(/\r?\n/);
                
                let htmlSiswa = "";
                let nomorDadaCounter = 1; 

                for (let i = 1; i < baris.length; i++) {
                    if (!baris[i].trim()) continue;
                    let separator = baris[i].includes(';') ? ';' : ',';
                    const kolom = baris[i].split(new RegExp(`${separator}(?=(?:(?:[^"]*"){2})*[^"]*$)`));
                    
                    const nama = kolom[0] ? kolom[0].replace(/"/g, '').trim() : "";
                    const tarikhLahir = kolom[1] ? kolom[1].replace(/"/g, '').trim() : "";
                    const bapa = kolom[2] ? kolom[2].replace(/"/g, '').trim() : "";
                    const ibu = kolom[3] ? kolom[3].replace(/"/g, '').trim() : "";
                    const urlFoto = kolom[4] ? kolom[4].replace(/"/g, '').trim() : ""; 

                    if (nama && nama !== "NAMA") {
                        let noDadaTampilan = nomorDadaCounter; 
                        let orangTuaBapa = bapa || "-";

                        htmlSiswa += `
                            <div class="kartu-peserta-baru" onclick="pilihSiswa('${noDadaTampilan}', '${nama.replace(/'/g, "\\'")}', '${tarikhLahir.replace(/'/g, "\\'")}', '${orangTuaBapa.replace(/'/g, "\\'")}', '${urlFoto}')">
                                <h3>${nama}</h3>
                                <span class="nomor-dada-besar">Nomor Dada: ${noDadaTampilan}</span>
                            </div>
                        `;
                        nomorDadaCounter++;
                    }
                }
                document.getElementById("gridSiswaKontainer").innerHTML = htmlSiswa;
                document.getElementById("loadingStatus").innerText = "Data Siswa Sinkron!";
            } catch (err) {
                document.getElementById("gridSiswaKontainer").innerHTML = `<div class="loading-text" style="color:#ff6b6b;">⚠️ Gagal memuat data siswa online.</div>`;
            }
        }

        function pindahSlide(nomorSlide) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.getElementById(`slide${nomorSlide}`).classList.add('active');
        }

        function pilihSiswa(noDada, nama, tarikh, orangtua, urlFoto) {
            document.getElementById("displayNama").innerText = nama;
            
            document.getElementById("displayMeta").innerHTML = `
                <strong>Nomor Dada:</strong> ${noDada}
                <strong>Tempat Tanggal Lahir:</strong> ${tarikh || '-'}
                <strong>Orangtua:</strong> ${orangtua || '-'}
            `;
            
            const frame = document.getElementById("displayFoto");
            if (urlFoto && urlFoto.startsWith('http')) {
                frame.innerHTML = `<img src="${urlFoto}" alt="${nama}">`;
            } else {
                frame.innerHTML = `<span class="photo-placeholder">👤</span>`;
            }
            
            pindahSlide(3);
        }

        function renderAyatLayar() {
            const surahId = parseInt(document.getElementById("surahSelect").value);
            const ayatNum = parseInt(document.getElementById("ayatInput").value);
            const key = `${surahId}_${ayatNum}`;

            // Logika pembaruan teks metaInfoDisplay telah dihapus agar tulisan tidak muncul kembali

            if (typeof quranDatabaseLokal !== 'undefined' && quranDatabaseLokal[key]) {
                document.getElementById("arabicTextDisplay").innerText = quranDatabaseLokal[key];
            } else {
                document.getElementById("arabicTextDisplay").innerText = `---`;
            }
        }

        function navigasiAyat(arah) {
            let input = document.getElementById("ayatInput");
            let baru = parseInt(input.value) + arah;
            if (baru >= 1) { input.value = baru; renderAyatLayar(); }
        }

        window.onload = function() {
            const select = document.getElementById("surahSelect");
            daftarNamaSurah.forEach((nama, indeks) => {
                let opt = document.createElement("option");
                opt.value = indeks + 1; opt.innerText = `${indeks + 1}. ${nama}`;
                select.appendChild(opt);
            });
            
            muatDatabaseSiswaOnline();
            renderAyatLayar();
        };
    </script>
</body>
</html>
