<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Slide Peraga Wisuda Tajwid 2026</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0d231d; color: #f4ebd0; overflow: hidden; height: 100vh; }

        /* SISTEM SLIDE PPT */
        .slide {
            display: none;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            padding: 40px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #113329 0%, #081713 100%);
            transition: all 0.5s ease-in-out;
        }
        .slide.active { display: flex; }

        /* NAVIGASI BACK UNTUK OPERATOR */
        .btn-back-slide {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: #d4af37;
            border: 1px solid #d4af37;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            z-index: 10;
        }
        .btn-back-slide:hover { background: #d4af37; color: #0d231d; }

        /* SLIDE 1: JUDUL UTAMA (COVER) */
        .cover-title { font-size: 48px; color: #d4af37; text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .cover-subtitle { font-size: 24px; color: #ffffff; text-align: center; margin-bottom: 40px; font-style: italic; opacity: 0.9; }
        .btn-start { background: linear-gradient(135deg, #d4af37, #aa820a); color: #0d231d; border: none; padding: 15px 40px; font-size: 18px; font-weight: bold; border-radius: 30px; cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: transform 0.2s; }
        .btn-start:hover { transform: scale(1.05); }

        /* SLIDE 2: DATA SISWA */
        .section-title { font-size: 32px; color: #d4af37; text-transform: uppercase; margin-bottom: 30px; text-align: center; border-bottom: 2px solid #d4af37; padding-bottom: 10px; width: 80%; }
        .grid-siswa { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; width: 85%; max-height: 70vh; overflow-y: auto; padding-right: 10px; }
        .card-siswa { background: #163d33; border: 1px solid rgba(212, 175, 55, 0.4); padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .card-siswa:hover { background: #d4af37; transform: translateY(-5px); }
        .card-siswa:hover h3 { color: #0d231d; }
        .card-siswa:hover p { color: #222; }
        .card-siswa h3 { font-size: 18px; color: #ffffff; margin-bottom: 5px; }
        .card-siswa p { font-size: 13px; color: #a3b8b0; }

        /* SLIDE 3: INTERFACE UJIAN & DISPLAY AYAT */
        .panel-control-top { display: flex; gap: 15px; width: 90%; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; border: 1px solid rgba(212,175,55,0.2); margin-bottom: 20px; align-items: flex-end; }
        .control-group { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .control-group label { font-size: 12px; color: #d4af37; font-weight: bold; text-transform: uppercase; }
        select, input { background-color: #163d33; color: #ffffff; border: 1px solid #d4af37; padding: 10px; border-radius: 5px; font-size: 14px; outline: none; width: 100%; }
        .btn-tampil { background: #d4af37; color: #0d231d; border: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; cursor: pointer; height: 41px; }

        /* DISPLAY UTAMA AYAT (STERIL & BESAR) */
        .display-container { flex: 1; width: 90%; background: rgba(255,255,255,0.02); border-radius: 15px; border: 1px dashed rgba(212,175,55,0.3); display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; padding: 20px; }
        .meta-info { font-size: 22px; color: #d4af37; font-weight: 600; margin-bottom: 15px; text-align: center; }
        .arabic-text { font-family: 'Traditional Arabic', Georgia, serif; font-size: 52px; text-align: center; direction: rtl; line-height: 2.2; color: #ffffff; width: 100%; max-height: 60vh; overflow-y: auto; padding: 10px; word-wrap: break-word; }

        /* NAVIGASI TOMBOL SLIDE BAWAH (PREV / NEXT AYAT) */
        .nav-ayat-buttons { display: flex; gap: 20px; margin-top: 15px; width: 30%; }
        .btn-nav-ayat { flex: 1; background: #163d33; color: #d4af37; border: 1px solid #d4af37; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-nav-ayat:hover { background: #d4af37; color: #0d231d; }

        /* INFO DATA SISWA YANG SEDANG UJIAN */
        .active-student-badge { position: absolute; top: 15px; right: 20px; background: #aa820a; color: #ffffff; padding: 5px 15px; border-radius: 20px; font-size: 13px; font-weight: bold; }
        .loading-text { color: #ffffff; font-style: italic; font-size: 16px; text-align: center; margin-top: 10px; }

        /* =======================================================
           ⚡ TAMBAHAN BARU: CSS RESPONSIVE KHUSUS LAYAR HP (MOBILE)
           ======================================================= */
        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; }
            .slide { 
                height: auto; 
                min-height: 100vh; 
                padding: 80px 20px 40px 20px; /* Jarak atas ditambah agar tidak menabrak tombol Back */
                position: relative;
            }
            
            /* Slide 1 - Judul */
            .cover-title { font-size: 28px; letter-spacing: 1px; }
            .cover-subtitle { font-size: 16px; margin-bottom: 30px; }
            
            /* Slide 2 - Grid Siswa */
            .section-title { font-size: 22px; width: 100%; margin-bottom: 20px; }
            .grid-siswa { width: 100%; max-height: none; gap: 12px; }
            .card-siswa { padding: 15px; }

            /* Slide 3 - Panel Kontrol Dropdown di HP (Menyusun Kebawah) */
            .panel-control-top { 
                flex-direction: column; 
                align-items: stretch; 
                gap: 12px; 
                width: 100%;
                padding: 12px;
            }
            .control-group { width: 100%; }
            .btn-tampil { width: 100%; height: 45px; margin-top: 5px; }

            /* Tampilan Kontainer Teks Ayat Al-Quran di HP */
            .display-container { width: 100%; min-height: 250px; padding: 15px; }
            .meta-info { font-size: 15px; margin-bottom: 10px; }
            .arabic-text { font-size: 30px; line-height: 2.0; max-height: 45vh; }
            
            /* Tombol Navigasi Bawah di HP */
            .nav-ayat-buttons { width: 100%; gap: 10px; margin-top: 15px; }
            .btn-nav-ayat { padding: 12px; font-size: 13px; }
            .active-student-badge { position: static; margin-bottom: 15px; text-align: center; }
        }
    </style>
</head>
<body>

    <div id="slide1" class="slide active">
        <h1 class="cover-title">WISUDA TAJWID MD-TK 2026</h1>
        <p class="cover-subtitle">Haflatul Imtihan Wal Ikhtihar 4</p>
        <button class="btn-start" onclick="pindahSlide(2)">Mulai &rarr;</button>
        <div id="loadingStatus" class="loading-text">Menghubungkan ke Database Quran & Siswa Online...</div>
    </div>

    <div id="slide2" class="slide">
        <button class="btn-back-slide" onclick="pindahSlide(1)">&larr; Kembali</button>
        <h2 class="section-title">Daftar Peserta Ujian</h2>
        <div class="grid-siswa" id="gridSiswaKontainer">
            <div class="loading-text">Memuat daftar nama siswa dari spreadsheet...</div>
        </div>
    </div>

    <div id="slide3" class="slide">
        <button class="btn-back-slide" onclick="pindahSlide(2)">&larr; Kembali</button>
        <div class="active-student-badge" id="siswaAktifBadge">Peserta: Umum</div>

        <div class="panel-control-top">
            <div class="control-group">
                <label>Lompat Awal Juz</label>
                <select id="juzShortcutSelect" onchange="lompatKeAwalJuz()">
                    <option value="">-- Pilih Juz 1 - 30 --</option>
                    <option value="1,1">Juz 1 (Al-Fatihah Ayat 1)</option>
                    <option value="2,142">Juz 2 (Al-Baqarah Ayat 142)</option>
                    <option value="3,253">Juz 3 (Al-Baqarah Ayat 253)</option>
                    <option value="4,92">Juz 4 (Ali 'Imran Ayat 92)</option>
                    <option value="5,24">Juz 5 (An-Nisa' Ayat 24)</option>
                    <option value="6,148">Juz 6 (An-Nisa' Ayat 148)</option>
                    <option value="7,83">Juz 7 (Al-Ma'idah Ayat 83)</option>
                    <option value="8,111">Juz 8 (Al-An'am Ayat 111)</option>
                    <option value="9,88">Juz 9 (Al-A'raf Ayat 88)</option>
                    <option value="10,41">Juz 10 (Al-Anfal Ayat 41)</option>
                    <option value="11,94">Juz 11 (At-Taubah Ayat 94)</option>
                    <option value="12,6">Juz 12 (Hud Ayat 6)</option>
                    <option value="13,53">Juz 13 (Yusuf Ayat 53)</option>
                    <option value="14,2">Juz 14 (Al-Hijr Ayat 2)</option>
                    <option value="15,1">Juz 15 (Al-Isra' Ayat 1)</option>
                    <option value="16,75">Juz 16 (Al-Kahf Ayat 75)</option>
                    <option value="17,1">Juz 17 (Al-Anbiya' Ayat 1)</option>
                    <option value="18,1">Juz 18 (Al-Mu'minun Ayat 1)</option>
                    <option value="19,21">Juz 19 (Al-Furqan Ayat 21)</option>
                    <option value="20,60">Juz 20 (An-Naml Ayat 60)</option>
                    <option value="21,45">Juz 21 (Al-'Ankabut Ayat 45)</option>
                    <option value="22,31">Juz 22 (Al-Ahzab Ayat 31)</option>
                    <option value="23,22">Juz 23 (Ya-Sin Ayat 22)</option>
                    <option value="24,32">Juz 24 (Az-Zumar Ayat 32)</option>
                    <option value="25,47">Juz 25 (Fussilat Ayat 47)</option>
                    <option value="26,1">Juz 26 (Al-Ahqaf Ayat 1)</option>
                    <option value="27,31">Juz 27 (Az-Zariyat Ayat 31)</option>
                    <option value="28,1">Juz 28 (Al-Mujadilah Ayat 1)</option>
                    <option value="29,1">Juz 29 (Al-Mulk Ayat 1)</option>
                    <option value="30,1">Juz 30 (An-Naba' Ayat 1)</option>
                </select>
            </div>
            <div class="control-group">
                <label>Pilih Surah</label>
                <select id="surahSelect"></select>
            </div>
            <div class="control-group">
                <label>Ayat</label>
                <input type="number" id="ayatInput" min="1" value="1">
            </div>
            <button class="btn-tampil" onclick="renderAyatLayar()">PROYEKSIKAN</button>
        </div>

        <div class="display-container">
            <div class="meta-info" id="metaInfoDisplay">Silakan Pilih Ayat Terlebih Dahulu</div>
            <div class="arabic-text" id="arabicTextDisplay">---</div>
        </div>

        <div class="nav-ayat-buttons">
            <button class="btn-nav-ayat" onclick="navigasiAyat(-1)">&larr; Prev</button>
            <button class="btn-nav-ayat" onclick="navigasiAyat(1)">Next &rarr;</button>
        </div>
    </div>

    <script>
        // ================= MASUKKAN LINK CSV MASING-MASING TAB DI SINI =================
        const URL_DATABASE_QURAN = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQSLdOv1AZmSd-BMDOTA6B1V8UXHtXcJ5FfqjPHTUWRkJ5bJxeTgQZAsBa9SLzGUI5gUog-VgfhB5g/pub?gid=0&single=true&output=csv";
        
        // PENTING: Ganti link di bawah dengan link CSV khusus untuk Tab "Siswa" milikmu
        const URL_DATABASE_SISWA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQSLdOv1AZmSd-BMDOTA6B1V8UXHtXcJ5FfqjPHTUWRkJ5bJxeTgQZAsBa9SLzGUI5gUog-VgfhB5g/pub?gid=123456789&single=true&output=csv"; 

        let quranDatabaseOnline = {};

        const daftarNamaSurah = [
            "Al-Fatihah","Al-Baqarah","Ali 'Imran","An-Nisa'","Al-Ma'idah","Al-An'am","Al-A'raf","Al-Anfal","At-Taubah","Yunus","Hud","Yusuf","Ar-Ra'd","Ibrahim","Al-Hijr","An-Nahl","Al-Isra'","Al-Kahf","Maryam","Taha","Al-Anbiya'","Al-Hajj","Al-Mu'minun","An-Nur","Al-Furqan","Asy-Syu'ara'","An-Naml","Al-Qasas","Al-'Ankabut","Ar-Rum","Luqman","As-Sajdah","Al-Ahzab","Saba'","Fatir","Yasin","As-Saffat","Sad","Az-Zumar","Ghafir","Fussilat","Asy-Syura","Az-Zukhruf","Ad-Dukhan","Al-Jasiyah","Al-Ahqaf","Muhammad","Al-Fath","Al-Hujurat","Qaf","Az-Zariyat","At-Tur","An-Najm","Al-Qamar","Ar-Rahman","Al-Waqi'ah","Al-Hadid","Al-Mujadilah","Al-Hasyr","Al-Mumtahanah","As-Saff","Al-Jumu'ah","Al-Munafiqun","At-Taghabun","At-Talaq","At-Tahrim","Al-Mulk","Al-Qalam","Al-Haqqah","Al-Ma'arij","Nuh","Al-Jinn","Al-Muzzammil","Al-Muddassir","Al-Qiyamah","Al-Insan","Al-Mursalat","An-Naba'","An-Nazi'at","'Abasa","At-Takwir","Al-Infitar","Al-Mutaffifin","Al-Insiqaq","Al-Buruj","At-Tariq","Al-A'la","Al-Ghasyiyah","Al-Fajr","Al-Balad","Asy-Syams","Al-Lail","Ad-Duha","Asy-Syarh","At-Tin","Al-'Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-'Adiyat","Al-Qari'ah","At-Takasur","Al-'Asr","Al-Humazah","Al-Fil","Quraisy","Al-Ma'un","Al-Kausar","Al-Kafirun","An-Nasr","Al-Lahab","Al-Ikhlas","Al-Falaq","An-Nas"
        ];

        const daftarBatasJuz = [
            { juz: 1, s: 1, a: 1 },    { juz: 2, s: 2, a: 142 },  { juz: 3, s: 2, a: 253 },  { juz: 4, s: 3, a: 92 },
            { juz: 5, s: 4, a: 24 },   { juz: 6, s: 4, a: 148 },  { juz: 7, s: 5, a: 83 },   { juz: 8, s: 6, a: 111 },
            { juz: 9, s: 7, a: 88 },   { juz: 10, s: 8, a: 41 },  { juz: 11, s: 9, a: 94 },  { juz: 12, s: 11, a: 6 },
            { juz: 13, s: 12, a: 53 }, { juz: 14, s: 15, a: 2 },  { juz: 15, s: 17, a: 1 },  { juz: 16, s: 18, a: 75 },
            { juz: 17, s: 21, a: 1 },  { juz: 18, s: 23, a: 1 },  { juz: 19, s: 25, a: 21 }, { juz: 20, s: 27, a: 60 },
            { juz: 21, s: 29, a: 45 }, { juz: 22, s: 33, a: 31 }, { juz: 23, s: 36, a: 22 }, { juz: 24, s: 39, a: 32 },
            { juz: 25, s: 41, a: 47 }, { juz: 26, s: 46, a: 1 },  { juz: 27, s: 51, a: 31 }, { juz: 28, s: 58, a: 1 },
            { juz: 29, s: 67, a: 1 },  { juz: 30, s: 78, a: 1 }
        ];

        const petaNomorSurahPintasan = {
            1: 1,  2: 2,  3: 2,  4: 3,  5: 4,  6: 4,  7: 5,  8: 6,  9: 7,  10: 8,
            11: 9, 12: 11, 13: 12, 14: 15, 15: 17, 16: 18, 17: 21, 18: 23, 19: 25, 20: 27,
            21: 29, 22: 33, 23: 36, 24: 39, 25: 41, 26: 46, 27: 51, 28: 58, 29: 67, 30: 78
        };

        async function muatSemuaDatabase() {
            // 1. Load Data Al-Quran
            try {
                const responseQ = await fetch(URL_DATABASE_QURAN);
                const csvQ = await responseQ.text();
                const barisQ = csvQ.split(/\r?\n/);

                for (let i = 1; i < barisQ.length; i++) {
                    if (!barisQ[i]) continue;
                    const kolom = barisQ[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (kolom[0] && kolom[3]) {
                        const key = kolom[0].replace(/"/g, '').trim(); 
                        const teksArab = kolom[3].replace(/"/g, '').trim(); 
                        quranDatabaseOnline[key] = teksArab;
                    }
                }
                document.getElementById("loadingStatus").innerText = "Database Quran Sinkron...";
            } catch (e) {
                console.error("Gagal Muat Quran:", e);
            }

            // 2. Load Data Siswa
            try {
                const responseS = await fetch(URL_DATABASE_SISWA);
                const csvS = await responseS.text();
                const barisS = csvS.split(/\r?\n/);
                
                let htmlSiswa = "";
                let countSiswa = 0;

                for (let i = 1; i < barisS.length; i++) {
                    if (!barisS[i]) continue;
                    const kolom = barisS[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    const nama = kolom[0] ? kolom[0].replace(/"/g, '').trim() : "";
                    const noReg = kolom[1] ? kolom[1].replace(/"/g, '').trim() : "";

                    if (nama && noReg) {
                        htmlSiswa += `
                            <div class="card-siswa" onclick="pilihSiswa('${nama}', '${noReg}')">
                                <h3>${nama}</h3>
                                <p>No. Reg: ${noReg}</p>
                            </div>
                        `;
                        countSiswa++;
                    }
                }

                if (countSiswa > 0) {
                    document.getElementById("gridSiswaKontainer").innerHTML = htmlSiswa;
                } else {
                    document.getElementById("gridSiswaKontainer").innerHTML = `<div class="loading-text">⚠️ Tab siswa kosong.</div>`;
                }

                document.getElementById("loadingStatus").innerText = "Semua Sistem Online Siap!";
                setTimeout(() => document.getElementById("loadingStatus").style.display = 'none', 2000);

            } catch (err) {
                console.error("Gagal Muat Siswa:", err);
                document.getElementById("gridSiswaKontainer").innerHTML = `<div class="loading-text" style="color:#ff6b6b">⚠️ Gagal mengambil data siswa. Cek koneksi internet!</div>`;
            }
        }

        function pindahSlide(nomorSlide) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.getElementById(`slide${nomorSlide}`).classList.add('active');
        }

        function pilihSiswa(nama, noReg) {
            document.getElementById("siswaAktifBadge").innerText = `Peserta: ${nama} (${noReg})`;
            pindahSlide(3);
        }

        function lompatKeAwalJuz() {
            let selectJuz = document.getElementById("juzShortcutSelect");
            let shortcutValue = selectJuz.value;
            if (!shortcutValue) return;
            
            let indeksJuz = selectJuz.selectedIndex; 
            let bagian = shortcutValue.split(",");
            
            document.getElementById("surahSelect").value = petaNomorSurahPintasan[indeksJuz];
            document.getElementById("ayatInput").value = bagian[1];
            renderAyatLayar();
        }

        function renderAyatLayar() {
            const surahId = parseInt(document.getElementById("surahSelect").value);
            const ayatNum = parseInt(document.getElementById("ayatInput").value);
            const key = `${surahId}_${ayatNum}`;
            const namaSurahBersih = daftarNamaSurah[surahId - 1];

            let juzTerdeteksi = 1;
            for (let i = 0; i < daftarBatasJuz.length; i++) {
                let batas = daftarBatasJuz[i];
                if (surahId > batas.s || (surahId === batas.s && ayatNum >= batas.a)) {
                    juzTerdeteksi = batas.j;
                } else {
                    break;
                }
            }

            document.getElementById("metaInfoDisplay").innerText = `Juz ${juzTerdeteksi} | Surah ${surahId}. ${namaSurahBersih} : Ayat ${ayatNum}`;

            if (quranDatabaseOnline[key]) {
                document.getElementById("arabicTextDisplay").innerText = quranDatabaseOnline[key];
            } else {
                document.getElementById("arabicTextDisplay").innerText = `(Teks Arab tidak ditemukan)`;
            }
        }

        function navigasiAyat(arah) {
            let ayatInput = document.getElementById("ayatInput");
            let nilaiSekarang = parseInt(ayatInput.value);
            let nilaiBaru = nilaiSekarang + arah;

            if (nilaiBaru >= 1) {
                ayatInput.value = nilaiBaru;
                renderAyatLayar();
            }
        }

        window.onload = function() {
            const select = document.getElementById("surahSelect");
            daftarNamaSurah.forEach((nama, indeks) => {
                let opt = document.createElement("option");
                opt.value = indeks + 1;
                opt.innerText = `${indeks + 1}. ${nama}`;
                select.appendChild(opt);
            });
            
            muatSemuaDatabase();
            renderAyatLayar();
        };
    </script>
</body>
</html>
